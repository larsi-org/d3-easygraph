<!doctype html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/colorbrewer@1.7.0/index.js"></script>
<link rel="stylesheet" href="../../dist/d3.easygraph.css">
<script src="../../dist/d3.easygraph.min.js"></script>
<style>#wrap { width: 600px; }</style>
</head>
<body>
<div id="wrap"><div id="graph"></div></div>
<script>
window.testData = [
  [ { x: "Jan", y: 3 }, { x: "Feb", y: 5 }, { x: "Mar", y: 2 } ],
  [ { x: "Jan", y: 4 }, { x: "Feb", y: 1 }, { x: "Mar", y: 6 } ]
];

window.graph = d3.easygraph.bars({
  container:   "#graph",
  label:       " ",
  height:      320,
  margin:      { top: 10, right: 14, bottom: 30, left: 50 },
  orientation: 'v',
  mode:        'grouped'
});

window.graph.update(window.testData);
</script>
</body>
</html>
