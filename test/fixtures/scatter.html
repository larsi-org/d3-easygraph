<!doctype html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/colorbrewer@1.7.0/index.js"></script>
<link rel="stylesheet" href="../../dist/d3.easygraph.css">
<script src="../../dist/d3.easygraph.min.js"></script>
<style>#wrap { width: 600px; }</style>
</head>
<body>
<div id="wrap"><div id="graph"></div></div>
<script>
window.testData = [
  { x: 0,  y: 0,  value: 0 },
  { x: 5,  y: 5,  value: 50 },
  { x: 10, y: 10, value: 100 }
];

window.graph = d3.easygraph.scatter({
  container: "#graph",
  label:     " ",
  x:         { scale: "linear" },
  y:         { scale: "linear" },
  height:    320,
  margin:    { top: 10, right: 14, bottom: 30, left: 50 }
});

window.graph.update(window.testData, [0, 10], [0, 10]);
</script>
</body>
</html>
