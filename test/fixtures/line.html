<!doctype html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/colorbrewer@1.7.0/index.js"></script>
<link rel="stylesheet" href="../../dist/d3.easygraph.css">
<script src="../../dist/d3.easygraph.min.js"></script>
<style>#wrap { width: 600px; }</style>
</head>
<body>
<div id="wrap"><div id="graph"></div></div>
<script>
window.testData = [[
  { x: new Date("2026-01-01T00:00:00"), y: 1, min: 0, max: 2 },
  { x: new Date("2026-01-01T06:00:00"), y: 3, min: 1, max: 4 },
  { x: new Date("2026-01-01T12:00:00"), y: 2, min: 0, max: 3 },
  { x: new Date("2026-01-01T18:00:00"), y: 5, min: 3, max: 6 }
]];

window.graph = d3.easygraph.line({
  container:  "#graph",
  x:          { scale: "time" },
  y:          { preset: "temperatureC" },
  height:     320,
  margin:     { top: 20, right: 20, bottom: 30, left: 50 },
  lines:      true,
  areas:      true,
  zoom:       [1, 50],
  crosshair:  true
});

window.graph.update(window.testData);
</script>
</body>
</html>
