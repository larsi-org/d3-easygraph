<!doctype html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/colorbrewer@1.7.0/index.js"></script>
<link rel="stylesheet" href="../../dist/d3.easygraph.css">
<script src="../../dist/d3.easygraph.min.js"></script>
<style>#wrap { width: 600px; }</style>
</head>
<body>
<div id="wrap"><div id="graph"></div></div>
<script>
window.testData = [
  { x: 0,   y: 0,   value: 0    },
  { x: 1,   y: 1,   value: 10   },
  { x: 2,   y: 2,   value: 20   },
  { x: 3,   y: 3,   value: 30   },
  { x: 4,   y: 4,   value: 40   },
  { x: 5,   y: 5,   value: 50   },
  { x: 6,   y: 6,   value: 60   },
  { x: 7,   y: 7,   value: 70   },
  { x: 8,   y: 8,   value: 80   },
  { x: 100, y: 100, value: 1000 }
];

window.graph = d3.easygraph.scatter({
  container: "#graph",
  label:     " ",
  x:         { scale: "linear", clip: [0, 0.9] },
  y:         { scale: "linear", clip: [0, 0.9] },
  color:     { clip: [0, 0.9] },
  height:    320,
  margin:    { top: 10, right: 14, bottom: 30, left: 50 }
});

// no xRange/yRange -- domain is computed from the data itself, so the clip actually engages
window.graph.update(window.testData);
</script>
</body>
</html>
