<!doctype html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/colorbrewer@1.7.0/index.js"></script>
<link rel="stylesheet" href="../../dist/d3.easygraph.css">
<script src="../../dist/d3.easygraph.min.js"></script>
<style>#wrap { width: 600px; }</style>
</head>
<body>
<div id="wrap"><div id="graph"></div></div>
<script>
window.testData = [
  // angle 0 -- points along +x (screen right), short magnitude
  { x: 0,  y: 0,  value: 0,   angle: 0,           magnitude: 5 },
  // angle PI/2 -- points along +y (screen down, since svg y grows downward), long magnitude
  { x: 5,  y: 5,  value: 50,  angle: Math.PI / 2, magnitude: 20 },
  // no angle/magnitude -- circle only, no arrow glyph
  { x: 10, y: 10, value: 100 }
];

window.graph = d3.easygraph.scatter({
  container: "#graph",
  label:     " ",
  x:         { scale: "linear" },
  y:         { scale: "linear" },
  height:    320,
  margin:    { top: 10, right: 14, bottom: 30, left: 50 },
  arrows:    true
});

window.graph.update(window.testData, [0, 10], [0, 10]);
</script>
</body>
</html>
